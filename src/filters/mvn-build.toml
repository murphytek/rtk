[filters.mvn-build]
description = "Compact Maven build output"
match_command = "^mvn\\s+(compile|package|clean|install|test|verify)\\b"
strip_ansi = true
strip_lines_matching = [
  "^Scanning for projects",
  "^\\[INFO\\] Scanning for projects",
  "^\\[INFO\\] Reactor",
  "^\\[INFO\\] ---",
  "^\\[INFO\\] -+$",
  "^\\[INFO\\] =+$",
  "^\\[INFO\\] $",
  "^\\[INFO\\]\\s*$",
  "^\\[INFO\\] Building\\s",
  "^\\[INFO\\] Downloading\\s",
  "^\\[INFO\\] Downloaded\\s",
  "^Downloading from\\s",
  "^Downloaded from\\s",
  "^Downloading:",
  "^Downloaded:",
  "^Progress \\(\\d+\\)",
  "^Progress\\s",
  "^WARNING: A restricted method",
  "^WARNING: java\\.lang\\.System::load",
  "^WARNING: Use --enable-native-access",
  "^WARNING: Restricted methods will be blocked",
  "^\\s*$",
]
max_lines = 50
on_empty = "mvn: ok"

[[tests.mvn-build]]
name = "strips INFO noise, preserves errors and summary"
input = """
[INFO] ---
[INFO] Building myapp 1.0-SNAPSHOT
[INFO] Downloading org.apache.maven.plugins:maven-compiler-plugin:3.11.0
[INFO] Downloaded org.apache.maven.plugins:maven-compiler-plugin:3.11.0
[INFO]
[ERROR] /src/main/java/Main.java:[10,5] cannot find symbol
  symbol: method foo()
[INFO] BUILD FAILURE
[INFO] Total time: 2.543 s
"""
expected = "[ERROR] /src/main/java/Main.java:[10,5] cannot find symbol\n  symbol: method foo()\n[INFO] BUILD FAILURE\n[INFO] Total time: 2.543 s"

[[tests.mvn-build]]
name = "successful build keeps BUILD SUCCESS line"
input = """
[INFO] ---
[INFO] Building myapp 1.0-SNAPSHOT
[INFO]
[INFO] BUILD SUCCESS
[INFO] Total time: 4.123 s
[INFO] Finished at: 2024-01-15T10:30:00Z
"""
expected = "[INFO] BUILD SUCCESS\n[INFO] Total time: 4.123 s\n[INFO] Finished at: 2024-01-15T10:30:00Z"

[[tests.mvn-build]]
name = "strips JDK restricted-method and download progress noise"
input = """
Scanning for projects...
[INFO] Reactor Build Order:
Downloading from central: https://repo.maven.apache.org/foo.jar
Downloaded from central: https://repo.maven.apache.org/foo.jar (12 kB at 4 kB/s)
Progress (1): 4/12 kB
WARNING: A restricted method in java.lang.System has been called
WARNING: java.lang.System::load has been called by org.fusesource.jansi
WARNING: Use --enable-native-access=ALL-UNNAMED to avoid a warning
WARNING: Restricted methods will be blocked in a future release
[INFO] BUILD SUCCESS
"""
expected = "[INFO] BUILD SUCCESS"
