[filters.gradle]
description = "Compact Gradle build output — strip progress, keep tasks and errors"
match_command = "^(gradle|gradlew|\\./)gradlew?\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  # progress / transient frames (carriage-return lines)
  "<\\d+/\\d+ tasks>",
  "\\b\\d+% EXECUTING",
  "\\b\\d+% CONFIGURING",
  "\\b\\d+% INITIALIZING",
  "\\b\\d+% WAITING",
  "^\\s*<-+>\\s*$",
  # task chatter (note: task-FAILED lines are matched by the keep-patterns below)
  "^> Task :.*UP-TO-DATE$",
  "^> Task :.*NO-SOURCE$",
  "^> Task :.*FROM-CACHE$",
  "^> Task :.*SKIPPED$",
  "^> Configuring project",
  "^> Resolving dependencies",
  "^> Transform ",
  "^Download(ing)?\\s+http",
  # configure / daemon / welcome chatter
  "^Configure project",
  "^Configuration on demand",
  "^Welcome to Gradle",
  "^Daemon will be stopped",
  "^Starting a Gradle Daemon",
  # jansi / SLF4J / native-platform restricted-access warnings
  "^WARNING: A restricted method",
  "^WARNING: java\\.lang\\.System::load has been called by net\\.rubygrapefruit\\.platform",
  "^WARNING: Use --enable-native-access",
  "^WARNING: Restricted methods will be blocked",
]
truncate_lines_at = 200
max_lines = 80
on_empty = "gradle: ok"

[[tests.gradle]]
name = "strips UP-TO-DATE tasks, keeps build result"
input = "> Configuring project :app\n> Task :app:compileJava UP-TO-DATE\n> Task :app:compileKotlin UP-TO-DATE\n> Task :app:test\n\n3 tests completed, 1 failed\n\nBUILD FAILED in 12s"
expected = "> Task :app:test\n3 tests completed, 1 failed\nBUILD FAILED in 12s"

[[tests.gradle]]
name = "clean build preserved"
input = "BUILD SUCCESSFUL in 8s\n7 actionable tasks: 7 executed"
expected = "BUILD SUCCESSFUL in 8s\n7 actionable tasks: 7 executed"

[[tests.gradle]]
name = "empty after stripping"
input = "> Configuring project :app\n"
expected = "gradle: ok"
